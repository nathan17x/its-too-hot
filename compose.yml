services:
  prometheus:
    hostname: prometheus
    container_name: prometheus
    image: prom/prometheus
    ports:
      - 9998:9090
    volumes:
      - ./prometheus/config:/etc/prometheus
      - ./prometheus/data:/prometheus
    restart: unless-stopped
  # alloy:
  #   hostname: alloy
  #   container_name: alloy
  #   image: grafana/alloy:latest
  #   ports:
  #     - "9997:12345"
  #   volumes:
  #     - ./alloy/config/config.alloy:/etc/alloy/config.alloy:ro
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   command:
  #     - run
  #     - --server.http.listen-addr=0.0.0.0:12345
  #     - --storage.path=/var/lib/alloy/data
  #     - /etc/alloy/config.alloy
  #   restart: unless-stopped
  alloy:
    hostname: alloy
    container_name: alloy
    image: grafana/alloy:latest
    ports:
      - 9997:12345
      - 9987:9987/udp
      - 4317:4317
      - 4318:4318
    volumes:
      - ./alloy/config/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
  loki:
    hostname: loki
    container_name: loki
    image: grafana/loki:latest
    ports:
      - "9996:3100"
    volumes:
      - ./loki/config/loki-config.yaml:/etc/loki/local-config.yaml
      - ./loki/data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
  grafana:
    hostname: grafana
    container_name: grafana
    image: grafana/grafana-enterprise
    environment:
      - GF_PATHS_CONFIG=/usr/share/grafana-config/custom.ini
    ports:
      - 9999:3000
    volumes:
      - ./grafana/config:/usr/share/grafana-config
      - ./grafana/data:/var/lib/grafana
    restart: unless-stopped
  snmp-exporter:
    hostname: snmp-exporter
    container_name: snmp-exporter
    image: prom/snmp-exporter
    ports:
      - 9901:9116
      - 161:161/udp
    volumes:
      - ./snmp-exporter/config:/etc/snmp-exporter
    command: --config.file=/etc/snmp-exporter/snmp.yml
    restart: unless-stopped
  carel-exporter:
    hostname: carel-exporter
    container_name: carel-exporter
    build:
      context: './carel-exporter'
    ports:
      - 9902:9000
    restart: unless-stopped
  cobalt-exporter:
    hostname: cobalt-exporter
    container_name: cobalt-exporter
    build:
      context: './cobalt-exporter'
    ports:
      - 9903:9000
    restart: unless-stopped
  gnmic:
    hostname: gnmic
    container_name: gnmic
    image: ghcr.io/openconfig/gnmic:latest
    volumes:
      - ./gnmic/config/gnmic.yml:/app/gnmic.yml
    command: ["--debug", "subscribe", "--config", "/app/gnmic.yml"]
    ports:
      - 9904:9000
    restart: unless-stopped
  

